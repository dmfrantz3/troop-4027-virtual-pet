<div class="container" class="game-container">
    <div class="row" *ngIf="myPet">
        <div class="col-12" class="title-bar">
            <div class="mb-3">
                <h3>Create Your Pet</h3>
            </div>
        </div>
        <div class="col-12" class="pad-top form-container">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Pet's Name</label>
                <input type="text" id="petname" class="form-control" [(ngModel)]="myPet.name" placeholder="What is your pet's name?">
            </div>
        </div>
        <div class="col-12" class="form-container">
            <div class="mb-3">
                <label for="favcolor">Pet's Color:</label>
                <input type="color" id="favcolor" class="form-control" [(ngModel)]="myPet.color" value="#ff0000">
            </div>
        </div>
        <div class="col-12" class="form-container">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Mood</label>
                <select id="mood" class="form-control" [(ngModel)]="myPet.mood">
                    <option value="Happy">Happy</option>
                    <option value="Sad">Sad</option>
                    <option value="Angry">Angry</option>
                    <option value="Bored">Bored</option>
                </select>
            </div>
        </div>
        <div class="col-12" class="form-container">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Pet Type</label>
                <select id="petType" class="form-control" [(ngModel)]="myPet.petType">
                    <option value="Cat">Cat</option>
                    <option value="Dog">Dog</option>
                    <option value="Unicorn">Unicorn</option>
                </select>
            </div>
        </div>
        <div class="col-12" class="form-container">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Gender</label>
                <select id="gender" class="form-control" [(ngModel)]="myPet.gender">
                    <option value="Boy">Boy</option>
                    <option value="Girl">Girl</option>
                </select>
            </div>
        </div>
        <!-- <div class="col-12" class="form-container">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Attribute Three</label>
                <input type="text" id="attribute3" class="form-control" [(ngModel)]="myPet.attribute3" placeholder="Attribute Three">
            </div>
        </div> -->
        <div class="col-12" class="form-container rt-align">
            <div class="mb-3">
                <button class="btn btn-md btn-success" (click)="createPet()">Create Pet</button>
            </div>
        </div>
        <div class="col-12" class="form-container">
            <div class="mb-3">
                <br /><br />
            </div>
        </div>
    </div>
</div>
